<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriNest</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg,#ffecd2,#fcb69f);
}
.card:hover {
  transform: scale(1.05);
  transition: 0.3s;
}
</style>
</head>

<body class="font-sans">

<!-- HEADER -->
<div class="bg-white p-4 text-center text-2xl font-bold text-orange-600 shadow">
🍎 NutriNest
</div>

<div class="p-4 space-y-5">

<!-- SCORE -->
<div class="bg-white p-4 rounded shadow text-center">
<h2 class="font-bold">Nutrition Score</h2>
<p id="score" class="text-3xl text-green-600 font-bold">75</p>
</div>

<!-- PROFILE -->
<div class="bg-white p-4 rounded shadow">
<h3 class="font-bold mb-2">👶 Child Profile</h3>
<input id="age" class="border p-2 w-full mb-2" placeholder="Age">

<select id="goal" class="border p-2 w-full mb-2">
<option value="balanced">Balanced</option>
<option value="weight">Weight Gain</option>
<option value="lowSugar">Low Sugar</option>
</select>

<button onclick="saveProfile()" class="bg-blue-500 text-white p-2 rounded w-full">
Save Profile
</button>
<p id="profileMsg" class="text-green-600 mt-2"></p>
</div>

<!-- FOOD ANALYZER -->
<div class="bg-white p-4 rounded shadow">
<h3 class="font-bold mb-2">🍔 Smart Food Analyzer</h3>

<input id="foodInput" class="border p-2 w-full mb-2"
placeholder="e.g. I ate pizza, burger and apple">

<div class="flex gap-2">
<button onclick="analyzeFood()" class="bg-orange-500 text-white p-2 rounded w-full">Analyze</button>
<button onclick="startVoice()" class="bg-blue-500 text-white px-3 rounded">🎤</button>
<button onclick="scanDemo()" class="bg-green-500 text-white px-3 rounded">📷</button>
</div>

<p id="result" class="mt-2 font-bold"></p>
</div>

<!-- MEAL PLANNER -->
<div class="bg-white p-4 rounded shadow">
<h3 class="font-bold mb-2">🍱 Smart Weekly Meal Plan</h3>
<button onclick="generateMealPlan()" class="bg-green-500 text-white p-2 rounded w-full mb-2">
Generate Plan
</button>
<div id="mealPlan"></div>
</div>

<!-- REWARDS -->
<div class="bg-white p-4 rounded shadow text-center">
<h3 class="font-bold mb-2">🎮 Rewards Store</h3>
<p>⭐ Points: <span id="points">0</span></p>
<div id="coupons" class="mt-2"></div>
<p id="rewardMsg" class="text-green-600 mt-2"></p>
</div>

</div>

<script>

// SCORE + POINTS
let score = 75;
let points = Number(localStorage.getItem("points")) || 0;
document.getElementById("points").innerText = points;

// PROFILE
function saveProfile(){
  let age = document.getElementById("age").value;
  let goal = document.getElementById("goal").value;
  localStorage.setItem("profile", JSON.stringify({age, goal}));
  document.getElementById("profileMsg").innerText="Saved ✅";
}

// 🔥 LARGE FOOD DATABASE
const junkFoods = [
"pizza","burger","cheeseburger","double burger","fries","french fries",
"loaded fries","chips","nachos","hot dog","shawarma","rolls",
"fried chicken","chicken wings","chicken nuggets",
"kurkure","lays","chips packet","oreo","kitkat","snickers",
"dairy milk","perk","5 star","munch","cream biscuits","biscuits",
"coke","pepsi","sprite","fanta","soft drink","energy drink",
"red bull","sting","cola","milkshake","chocolate shake",
"cake","pastry","cupcake","brownie","donut","waffles",
"ice cream","kulfi","jalebi","gulab jamun","rasgulla",
"laddu","kaju katli","halwa",
"maggi","instant noodles","ramen","frozen food",
"processed cheese","white bread","butter naan"
];

const healthyFoods = [
"apple","banana","orange","grapes","mango","papaya",
"watermelon","pomegranate","guava","pear","kiwi","strawberry",
"carrot","broccoli","spinach","cabbage","cauliflower",
"beans","peas","tomato","cucumber","beetroot","pumpkin","capsicum",
"dal","rice","brown rice","roti","chapati","idli","dosa",
"upma","poha","khichdi",
"egg","boiled egg","omelette","paneer","tofu",
"grilled chicken","boiled chicken","fish","grilled fish",
"milk","curd","yogurt","buttermilk",
"nuts","almonds","walnuts","cashews","oats","porridge",
"salad","vegetable soup","dal soup","sprouts",
"coconut water","fruit bowl","dry fruits"
];

const moderateFoods = [
"biryani","veg biryani","chicken biryani","pulao",
"rajma chawal","chole bhature","paneer butter masala",
"butter chicken","dal makhani",
"paratha","aloo paratha","paneer paratha",
"sandwich","cheese sandwich",
"pasta","mac and cheese","noodles","fried rice",
"omelette","egg curry","chapati with sabzi"
];

// 🧠 ANALYZER
function analyzeFood(){
  let input = document.getElementById("foodInput").value.toLowerCase();
  let result = document.getElementById("result");

  if(!input){
    result.innerHTML="⚠️ Enter food first";
    return;
  }

  let j=0,h=0,m=0;

  junkFoods.forEach(f=>{ if(input.includes(f)) j++; });
  healthyFoods.forEach(f=>{ if(input.includes(f)) h++; });
  moderateFoods.forEach(f=>{ if(input.includes(f)) m++; });

  let msg="", suggestion="", emoji="";

  if(j>h && j>m){
    msg="❌ Junk Heavy Meal";
    suggestion="👉 Reduce junk & add fruits.";
    emoji="⚠️";
    score-=10;
    addPoints(-5);
  }
  else if(h>=j && h>0){
    msg="✅ Healthy Meal 🎉";
    suggestion="💪 Great job!";
    emoji="🌟";
    score+=5;
    addPoints(10);
  }
  else if(m>0){
    msg="⚖️ Moderate Meal";
    suggestion="👉 Improve balance.";
    emoji="👍";
    addPoints(2);
  }
  else{
    msg="🤔 Not recognized";
    suggestion="Try simple names.";
    emoji="❓";
  }

  result.innerHTML = `
    ${emoji} ${msg}<br>
    🍟 ${j} | 🥗 ${h} | ⚖️ ${m}<br>
    ${suggestion}
  `;

  if(score<0) score=0;
  if(score>100) score=100;

  document.getElementById("score").innerText = score;
  flashResult();
}

// UI EFFECT
function flashResult(){
  let box=document.getElementById("result");
  box.style.transform="scale(1.05)";
  setTimeout(()=>box.style.transform="scale(1)",200);
}

// POINT SYSTEM
function addPoints(val){
  points += val;
  if(points<0) points=0;

  localStorage.setItem("points",points);
  document.getElementById("points").innerText=points;
  renderCoupons();
}

// COUPONS
let coupons = [
{id:1,name:"🥗 10% Healthy Discount",cost:50,used:false},
{id:2,name:"🍎 Free Fruit Pack",cost:80,used:false}
];

function renderCoupons(){
  let box=document.getElementById("coupons");
  box.innerHTML="";

  coupons.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c.used?"Used":(points>=c.cost?"Redeem":"Locked");

    btn.className="ml-2 px-2 py-1 rounded text-white " + 
    (c.used?"bg-gray-400":(points>=c.cost?"bg-green-500":"bg-gray-300"));

    btn.onclick=()=>redeem(c.id);

    let row=document.createElement("div");
    row.innerText=c.name+" ("+c.cost+"⭐)";
    row.appendChild(btn);

    box.appendChild(row);
  });
}

function redeem(id){
  let c=coupons.find(x=>x.id===id);

  if(points<c.cost){
    alert("Not enough points");
    return;
  }

  points-=c.cost;
  c.used=true;

  localStorage.setItem("points",points);
  document.getElementById("points").innerText=points;
  document.getElementById("rewardMsg").innerText="🎉 Redeemed!";
  renderCoupons();
}

// MEAL PLAN
function generateMealPlan(){
  let profile = JSON.parse(localStorage.getItem("profile")) || {};
  let goal = profile.goal || "balanced";

  const meals = {
    balanced:["🥣 Oats","🍛 Rice + Dal","🫓 Roti + Paneer","🍎 Fruits"],
    weight:["🥞 Paratha","🍗 Chicken Rice","🥛 Milkshake","🍌 Banana"],
    lowSugar:["🥗 Salad","🍲 Veg Soup","🥒 Cucumber","🥜 Nuts"]
  };

  let plan = meals[goal];
  let div = document.getElementById("mealPlan");
  div.innerHTML="";

  ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(day=>{
    let card=document.createElement("div");
    card.className="bg-yellow-50 p-2 rounded mt-2 card";

    card.innerHTML=`
      <b>${day}</b><br>
      🌅 ${random(plan)}<br>
      ☀️ ${random(plan)}<br>
      🌙 ${random(plan)}<br>
      🍎 ${random(plan)}
    `;

    div.appendChild(card);
  });
}

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// VOICE
function startVoice(){
  let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-IN";
  rec.onresult=e=>{
    document.getElementById("foodInput").value=e.results[0][0].transcript;
  };
  rec.start();
}

// SCAN DEMO
function scanDemo(){
  const demo=["pizza","apple","burger","milk","chips"];
  let f=demo[Math.floor(Math.random()*demo.length)];
  document.getElementById("foodInput").value=f;
  analyzeFood();
}

renderCoupons();

</script>

</body>
</html>
